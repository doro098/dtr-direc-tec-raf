sources:
  mulinku:
    callback_url: http://mulinku:8080/webhooks/tags
    method: llm
    provider: ollama
    model: qwen2.5:3b
    temperature: 0.1
    max_tags: 5
    system_prompt: |
      Eres un clasificador de contenido web.
      Dado un texto y etiquetas existentes, sugiere NUEVAS etiquetas relevantes.
      No repitas etiquetas que ya existen.
      Responde SOLO un JSON array de strings, sin explicaciones.
      Máximo 5 etiquetas.

  tureparto:
    callback_url: http://cliente-tureparto:3001/webhook
    method: embedding
    provider: ollama
    model: nomic-embed-text
    max_tags: 3
    threshold: 0.6
    categories:
      - pedido
      - consulta
      - reclamo
      - direccion
      - horario
      - precio
      - producto
      - cancelacion
